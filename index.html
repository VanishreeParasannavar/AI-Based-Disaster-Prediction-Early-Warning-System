<!DOCTYPE html>
<html>
<head>
    <title>Disaster Prediction</title>
</head>
<body>
    <h1>🌍 AI-Based Disaster Prediction System & Early Warning System</h1>
    <form action="/predict" method="post">
        <label>Temperature (°C):</label><br>
        <input type="number" name="temperature" required><br><br>

        <label>Rainfall (mm):</label><br>
        <input type="number" name="rainfall" required><br><br>

        <label>Wind Speed (km/h):</label><br>
        <input type="number" name="wind_speed" required><br><br>

        <input type="submit" value="Predict">
    </form>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}
</body>
</html>
